[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    miguelbalboa/MFRC522@^1.4.10
    bblanchon/ArduinoJson@^6.21.5

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0

